name: Crave Builder
on:
  workflow_dispatch:
    inputs:
      base_project:
        description: 'Base project'
        required: true
        default: 'AOSP'
      init_command:
        description: 'Initialize Command'
        required: true
        default: 'repo init -u https://github.com/crdroidandroid/android.git -b 16.0 --git-lfs --depth 1'
      local_manifest:
        description: 'Personal local manifest [repository]'
        required: true
        default: 'https://github.com/mdimran-mrbd/local_manifests'
      product_to_build:
        description: 'Product to build'
        required: true
        default: 'lineage_toco-ap3a-userdebug'
      build_command:
        description: 'Command for compiling'
        required: true
        default: 'brunch toco'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Run Build
        run: |
          # 1. Download Crave
          curl -sL https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          
          # 2. Move it to a local folder and add to path for THIS step
          mkdir -p bin
          mv crave bin/
          export PATH=$PWD/bin:$PATH
          
          # 3. Configure Crave
          mkdir -p $HOME/.crave
          echo "${{ secrets.CRAVE_TOKEN }}" > $HOME/.crave/crave.conf
          
          # 4. Verify and Run
          crave version
          
          crave run --base "${{ github.event.inputs.base_project }}" \
          --init "${{ github.event.inputs.init_command }}" \
          --manifest "${{ github.event.inputs.local_manifest }}" \
          --product "${{ github.event.inputs.product_to_build }}" \
          --build "${{ github.event.inputs.build_command }}"

        - name: Install and Run Build
        run: |
          # 1. Download Crave
          curl -sL https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          
          # 2. Setup executable
          mkdir -p bin
          mv crave bin/
          export PATH=$PWD/bin:$PATH
          
          # 3. Create the config file in the CURRENT directory
          echo '${{ secrets.CRAVE_TOKEN }}' > ./crave.conf
          
          # 4. Verify and Run with the -c flag to force the config
          crave version
          
          crave -c ./crave.conf run --base "${{ github.event.inputs.base_project }}" \
          --init "${{ github.event.inputs.init_command }}" \
          --manifest "${{ github.event.inputs.local_manifest }}" \
          --product "${{ github.event.inputs.product_to_build }}" \
          --build "${{ github.event.inputs.build_command }}"
